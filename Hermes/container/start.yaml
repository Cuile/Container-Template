services:
  hermes:
    # 使用官方镜像
    image: nousresearch/hermes-agent:v2026.6.19
    container_name: hermes
    restart: unless-stopped
    # 环境变量配置
    environment:
      # 启用 Web Dashboard
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_INSECURE=1
      # 启用 API Server
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      # 【重要】修改下面这个 API Key，使用强密码
      - API_SERVER_KEY=<key>
      # 设置容器内的工作目录，要与 volumes 挂载路径一致 [citation:8]
      - HERMES_HOME=/opt/data/.hermes
      - TZ=Asia/Shanghai
    volumes:
      # Hermes 的核心数据（配置、记忆、会话、技能）会存到这里
      - hermes_data:/opt/data/
      # 可选：映射日志目录，方便查看
      - hermes_logs:/app/logs/
    ports:
      - "8642:8642" # API 服务端口
      - "9119:9119" # Web Dashboard 端口
    
    command: ['gateway', 'run']

    # 资源限制建议 [citation:7]
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
  
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:0.8.3-slim
    container_name: hindsight
    restart: unless-stopped
    environment:
      - HINDSIGHT_API_LLM_PROVIDER=deepseek
      - HINDSIGHT_API_LLM_API_KEY=<api key>
      - HINDSIGHT_API_LLM_MODEL=deepseek-v4-flash
      - TZ=Asia/Shanghai
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    ports:
      - "8888:8888" # API Server
      - "9999:9999" # Web UI

volumes:
  hermes_data:
    name: hermes_data
  hermes_logs:
    name: hermes_logs
  hindsight_data:
    name: hindsight_data
