user = "frpc"
serverAddr = "<frps_host>"
serverPort = 7000

[transport]
protocol = "quic"

[auth]
method = "token"
token = "<token>"

[webServer]
addr = "0.0.0.0"
port = 80
user = "<user>"
password = "<password>"

[store]
path = "/etc/frp/frpc_store.json"

[log]
to = "/etc/frp/frpc.log"
level = "trace"
maxDays = 6
