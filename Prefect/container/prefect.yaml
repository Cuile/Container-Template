services:
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    volumes:
      - redis_data:/data

  prefect-server:
    image: prefecthq/prefect:3.7.8.dev3-python3.12-conda
    container_name: prefect-server
    depends_on:
      - postgres
      - redis
    environment:
      PREFECT_UI_URL: http://0.0.0.0:4200
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
      PREFECT_SERVER_UI_V2_ENABLED: True
      PREFECT_SERVER_UI_SHOW_PROMOTIONAL_CONTENT: False
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
      PREFECT_SERVER_UI_API_URL: http://${PREFECT_SERVER_IP}:4200/api
    command: ["prefect", "server", "start", "--no-services"]
    ports:
      - "4200:4200"

  prefect-services:
    image: prefecthq/prefect:3.7.8.dev3-python3.12-conda
    container_name: prefect-services
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
    command: ["prefect", "server", "services", "start"]

  prefect-worker:
    image: cuile/prefect
    build:
      context: .
      dockerfile: dockerfile
    container_name: prefect-worker
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    command: ["prefect", "worker", "start", "--pool", "local-pool"]
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
